<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi lời nhắn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h1,
        p {
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        textarea {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            width: 100%;
        }

        button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Gửi lời nhắn</h1>
        <p>Điền email và nội dung, dữ liệu sẽ được lưu vào Google Sheet.</p>

        <form id="messageForm">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required />

            <label for="content">Nội dung</label>
            <textarea id="content" name="content" placeholder="Viết điều bạn muốn gửi" required></textarea>

            <button type="submit">Gửi</button>
        </form>

        <div id="status" class="status"></div>
    </div>

    <script>
        const form = document.getElementById('messageForm');
        const statusEl = document.getElementById('status');

        // DÁN URL WEB APP GOOGLE APPS SCRIPT CỦA BẠN VÀO ĐÂY
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLLNjVS4AWO4oDvwt3vd5TGx3vvU8Vmn0WWy8I-reie81rXNFHSSkFBHfN4iljGA/exec';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!email || !content) {
                statusEl.textContent = 'Vui lòng nhập đầy đủ thông tin.';
                statusEl.className = 'status error';
                return;
            }

            statusEl.textContent = 'Đang gửi...';
            statusEl.className = 'status';

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ email, content }),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    }
                });

                const result = await response.json();

                if (result.result === 'success') {
                    statusEl.textContent = 'Gửi thành công!';
                    statusEl.className = 'status success';
                    form.reset();
                } else {
                    throw new Error(result.message || 'Có lỗi xảy ra');
                }
            } catch (error) {
                statusEl.textContent = 'Gửi thất bại: ' + error.message;
                statusEl.className = 'status error';
            }
        });
    </script>
</body>

</html>
